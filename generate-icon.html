<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="180" height="180"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Background
const bg = ctx.createLinearGradient(0, 0, 180, 180);
bg.addColorStop(0, '#1a1a2e');
bg.addColorStop(0.5, '#16213e');
bg.addColorStop(1, '#0a0a0a');
ctx.fillStyle = bg;
ctx.beginPath();
ctx.roundRect(0, 0, 180, 180, 40);
ctx.fill();

// Glow
ctx.globalAlpha = 0.15;
ctx.fillStyle = '#ff0080';
ctx.beginPath(); ctx.arc(40, 140, 60, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#00ffff';
ctx.beginPath(); ctx.arc(140, 40, 60, 0, Math.PI*2); ctx.fill();
ctx.globalAlpha = 1;

// Antenna
const ag = ctx.createLinearGradient(86, 42, 86, 22);
ag.addColorStop(0, '#ff0080'); ag.addColorStop(1, '#00ffff');
ctx.fillStyle = ag;
ctx.beginPath(); ctx.roundRect(86, 22, 8, 20, 4); ctx.fill();

// Antenna ball
ctx.fillStyle = '#00ffff';
ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 12;
ctx.beginPath(); ctx.arc(90, 18, 8, 0, Math.PI*2); ctx.fill();
ctx.shadowBlur = 0;

// Robot head
ctx.fillStyle = '#1a1a2e';
ctx.strokeStyle = '#ff0080'; ctx.lineWidth = 3;
ctx.beginPath(); ctx.roundRect(55, 45, 70, 55, 14); ctx.fill(); ctx.stroke();

// Eyes
ctx.fillStyle = '#00ffff';
ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 10;
ctx.beginPath(); ctx.arc(75, 68, 9, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(105, 68, 9, 0, Math.PI*2); ctx.fill();
ctx.shadowBlur = 0;

// Mouth
ctx.strokeStyle = '#ff0080'; ctx.lineWidth = 3; ctx.lineCap = 'round';
ctx.beginPath(); ctx.moveTo(78, 82); ctx.quadraticCurveTo(90, 95, 102, 82); ctx.stroke();

// × symbol
ctx.font = 'bold 40px Arial Black';
ctx.textAlign = 'center';
const tg = ctx.createLinearGradient(70, 110, 110, 140);
tg.addColorStop(0, '#00ffff'); tg.addColorStop(1, '#0080ff');
ctx.fillStyle = tg;
ctx.fillText('×', 90, 135);

// BM text
ctx.font = 'bold 14px Arial Black';
ctx.fillStyle = '#ff0080';
ctx.shadowColor = '#ff0080'; ctx.shadowBlur = 8;
ctx.fillText('BM', 90, 168);
ctx.shadowBlur = 0;

// Download
const a = document.createElement('a');
a.download = 'icon.png';
a.href = c.toDataURL('image/png');
a.textContent = 'Download icon.png';
a.style.cssText = 'display:block;margin:20px;font-size:24px;color:blue';
document.body.appendChild(a);
</script>
</body>
</html>
