<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BABYMONSTER Maths!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff0080">
</head>
<body>
    <div class="container">
        <div class="corner-decor tl"></div>
        <div class="corner-decor tr"></div>
        <div class="corner-decor bl"></div>
        <div class="corner-decor br"></div>
        
        <div class="logo">★ BABYMONSTER ★</div>
        <div class="robot" id="robot">
            <div class="robot-antenna"></div>
            <div class="robot-head">
                <div class="robot-eye left"></div>
                <div class="robot-eye right"></div>
                <div class="robot-mouth"></div>
            </div>
        </div>
        <h1>Maths Attack!</h1>
        
        <div id="settings" class="settings">
            <label>Tables jusqu'à : 
                <select id="maxNumber">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="12">12</option>
                </select>
            </label>
            <button id="startBtn" class="btn btn-start">C'est parti !</button>
            
            <div class="mode-divider">— ou —</div>
            
            <div class="challenge-mode-section">
                <div class="challenge-mode-title">🎯 Mode Défi</div>
                <div class="challenge-table-buttons">
                    <button class="btn btn-table" data-table="6">Table de 6</button>
                    <button class="btn btn-table" data-table="7">Table de 7</button>
                    <button class="btn btn-table" data-table="8">Table de 8</button>
                    <button class="btn btn-table" data-table="9">Table de 9</button>
                </div>
            </div>
        </div>

        <div id="game" class="game hidden">
            <div class="score-board">
                <span>Score : <span id="score">0</span></span>
                <span>🔥 Série : <span id="streak">0</span></span>
            </div>
            
            <div id="challengeModeLabel" class="challenge-mode-label hidden">🎯 Défi : Table de <span id="challengeTableNum">6</span></div>
            
            <div class="side-panels">
                <div class="mastered-panel" id="masteredPanel">
                    <div class="mastered-header">✅ Maîtrisé</div>
                    <div class="mastered-list" id="masteredList"></div>
                </div>
                <div class="challenges-panel" id="challengesPanel">
                    <div class="challenges-header">🎯 Défis</div>
                    <div class="challenges-list" id="challengesList"></div>
                </div>
            </div>
            
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
            
            <div class="question">
                <span id="num1">?</span> × <span id="num2">?</span> = ?
            </div>
            
            <div id="answerDisplay" class="answer-display empty"></div>
            
            <div class="numpad">
                <button class="num-btn" data-num="1">1</button>
                <button class="num-btn" data-num="2">2</button>
                <button class="num-btn" data-num="3">3</button>
                <button class="num-btn" data-num="4">4</button>
                <button class="num-btn" data-num="5">5</button>
                <button class="num-btn" data-num="6">6</button>
                <button class="num-btn" data-num="7">7</button>
                <button class="num-btn" data-num="8">8</button>
                <button class="num-btn" data-num="9">9</button>
                <button class="num-btn clear" data-action="clear">EFF</button>
                <button class="num-btn zero" data-num="0">0</button>
                <button class="num-btn backspace" data-action="back">⌫</button>
            </div>
            
            <div id="feedback" class="feedback"></div>
            
            <button id="submitBtn" class="btn btn-submit">Vérifier !</button>
            
            <button id="newGameBtn" class="btn btn-new hidden">Nouvelle Partie</button>
            <button id="backBtn" class="btn btn-back">⬅ Menu</button>
        </div>
    </div>
    
    <script src="game.js"></script>
    
    <div class="history-panel hidden" id="historyPanel">
        <div class="history-header">📊 Historique des scores</div>
        <div class="history-list" id="historyList"></div>
    </div>
</body>
</html>
